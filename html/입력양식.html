<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
        선택자를 이용해서 요소를 선택하고 중괄호 안에 스타일을 정의한다
        선택자 : 요소를 선택
                #아이디

        선택자 {
            속성 : 값;
            속성 : 값;
            width : 30px;
            height : 20px;

            }
        */
        #number {
            width: 300px;
            height : 200px;
        } 

        label{
            display: inline-block;
            width: 100px;
        }
    </style>
</head>
<body>
    <h1>입력양식</h1>
    <!--
        form : 서버에 데이터를 전달 하기 위해서 사용
        action : 요청 하려는 페이지의 주소
        method : 요청방식 : (get-기본값 , post)
        name : 자바스크립트로 폼을 제어하기 위해 사용
    -->
    <form action="loginAction.html" method="get" 
        name="loginForm" target="_self">
        id : <input type="text" name="id" minlength="4" maxlength="12" required><br>
        아이디는 4자이상 12자 이하로 입력해주세요<br>
        pw : <input type="password" name="pw" required><br>

        <!-- 버튼의 종류 -->
        <input type ="button" value="로그인">
        <!-- 
            form 태그의 aciton속성을 서버에 요청
            method 속성에 정의된 방식으로
            (만약 지정하지 않았다면 기본값인 get방식)
            http://127.0.0.1:5500/frontend/html/loginAction.html?id=aa&pw=bb

            프로토콜(통신규약) http://
            ip주소(서버주소)  127.0.0.1
            port            :5500
            경로        /frontend/html/loginAction.html
            쿼리스트링   ?id=aa&pw=bb
                        name 속성의 값 = 입력 필드에 입력된 값

            데이터가 넘어가지 않는 경우
                name 속성이 있는지
                form 태그로 감싸져 있는지
            

        -->
        <input type ="submit" value="서브밋">
        <input type ="reset" value="리셋">


    </form>

    <hr>
    <h1>입력양식의 종류</h1>
    <form action="loginAction.html">

        <fieldset>
            <legend>텍스트입력양식</legend>
            <!--
            label - 폼 요소에 이름을 붙일 때 사용
            for 속성을 이용해서 요소와 연결
            for = "요소의 아이디"

            레이블을 선택하면 입력요소의 커서가 들어간다
            -->
            
        <label for="test">text</label>
        <input id="test" type="text" value="텍스트 입력" placeholder = "아이디를 입력해주세요"><br>
        <label for="test1">password</label>
        <input type="password" name="" id="test1" placeholder = "비밀번호를 입력주세요"><br>
        <!--
            value : 입력내용 - 서브밋 버튼을 눌렀을때 서버로 전달되는 내용
            placeholder : 입력창에 표시될 힌트 텍스트 
        -->
        <label for="test2">search</search></label>
        <input type="search" name="" id="test2"><br>
        <!-- http:// , https:// 문자가 있는지 체크-->
        <label for="test3">url</label>
        <input type="url" name="" id="test3"><br>
        <label for="test4">email</label>
        <input type="email" name="" id="test4"><br>
        </fieldset>

        <fieldset>
            <legend>체크박스/라디오버튼</legend>
            checkbox - 취미
        <!--
            name 속성으로 묶어주고
            선택된 value 속성의 값이 서버에 전달

        -->
        <input type="checkbox" name="hobby" id="" value="1">축구
        <input type="checkbox" name="hobby" id="" value="2">농구
        <input type="checkbox" name="hobby" id="" value="3">야구
        <input type="checkbox" name="hobby" id="" value="4">배구
        <br>
        성별
        <input type="radio" name="gender" value="1" id=""> 남
        <input type="radio" name="gender" value="2" id=""> 여
        <input type="radio" name="gender" value="3" id=""> 비밀
        </fieldset>
        
        <br>
        number<input type="number" name="" id="number"
                     max="100" min="1" step="10">
        <!--
            크기지정 1.태그에 직접 2.상단 3.외부파일 
        -->

        <hr>
        <input type="submit" value="회원가입">


    </form>
</body>
</html>
