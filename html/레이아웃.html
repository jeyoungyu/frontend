<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>레이아웃</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>

        * {
            box-sizing: border-box;
            margin: 0px;
        }

        header{
            width: 100%;
            height: 200px;
            background-color: antiquewhite;

        }
        main{
            width: 100%;
            /* vh : 창의 높이 , vw : 창의너비 */
            height: 70vh;
            background-color: rgb(255, 91, 91);

        }
        footer{
            width: 100%;
            height: 200px;
            background-color: aquamarine;

        }

        .container{
            width: 80%;
            margin: 0 auto;
        }

        .banner{
            height: 70px;
            line-height: 70px;
            background-color: black;
            color: white;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 600;
            
        }

        .flexbox{
            display: flex;
            justify-content: end;
        }

        .item{
            width: 100px;

        }

        ul{
            list-style: none;
        }

        a{
            text-decoration: none;
            color: #333;

        }

        .top_quickmenu a{
            padding: 20px 20px;
        }

        .logo_item{
            text-align: right;
            font-size: 1.2rem;
            height: 100%;
            line-height: 100%;
        }

        .logo_item i{
            padding: 20px 10px;
        }

        .logo{
            border: 1px solid red;
            height: 100px;
            background: url(https://comebello.com/web/upload/NNEditor/20251121/ba8f74a75353773d1df10773fb1ab100.png) no-repeat;
        }
    </style>
</head>
<body>
    
        </header>
        <!--메인 : 컨텐츠 , 서비스 , 주력상품-->
        <div class="container">
        <!--헤더 : 로고 , 메뉴 , 퀵메뉴-->
        <header>
            <div class="banner">🐱‍👤당일 배송🐱‍👤</div>
            <div class="top_quickmenu flexbox">
                <div class="flexbox">
                    <a class="item">로그인</a>
                    <a class="item">회원가입</a>
                    <a class="item">마이샵</a>
                    <a class="item">커뮤니티</a>
                    <a class="item">KR</a>
                    <a href=""></a>
                </div>
            </div>

            <div class="top_quickmenu">
                <ul class="flexbox">
                    <li class="quickmenu_item">로그인</li>
                    <li class="quickmenu_item">회원가입</li>
                    <li class="quickmenu_item">마이샵</li>
                    <li class="quickmenu_item">커뮤니티</li>
                    <li class="quickmenu_item">KR</li>
                </ul>
            </div>

            <div class="logo">
                <div class="logo_item">
                    <i class="bi bi-dice-5"></i>
                    <i class="bi bi-dice-5"></i>
                    <i class="bi bi-dice-5"></i>
                    <i class="bi bi-dice-5"></i>
                    <i class="bi bi-dice-5"></i>
                </div>
            </div>
        <main></main>
        <!--footer-->
        <footer></footer>


    </div>
</body>
</html>
