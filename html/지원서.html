<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #why {
            width: 300px;
            height: 100px;

        }

        label{
            display: inline-block;
            width: 50px;
        }
    </style>
</head>
<body>
    <h1>프런트엔드 개발자 지원서</h1>
    HTML , CSS , Javascript에 대한 기술적 이해와 경험이 있는 분을 찾습니다.

    <hr>
    <form>
        <h3>개인정보</h3>
        <ul>
            <li>
                <label for="name">이름</label>
                    <input id="name" type="text" placeholder="공백없이 입력하세요"><br>
            </li>
            <li>
                <label for="num">연락처</label>
                    <input id="num" type="text"><br>
            </li>    
        </ul>
        <h3>지원 분야</h3>
        <ul>
            <li>
                <input type="radio" name="web_P" value="1" id=""> 웹 퍼블리싱<br>
            </li>
            <li>
                <input type="radio" name="web_A" value="1" id=""> 웹 애플리케이션 개발<br>
            </li>
            <li>
                <input type="radio" name="B" value="1" id=""> 개발 환경 개선
            </li>
        </ul>

        <h3>지원동기</h3>
        <input type="text" name="why" id="why" placeholder="본사 지원 동기를 간략히 써 주세요." autofocus><br>
        <input type="submit" value="접수하기">
        <input type="reset" value="다시쓰기">

    </form>
    

</body>
</html>
